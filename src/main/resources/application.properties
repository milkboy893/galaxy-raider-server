# ===================================================================
# データベース接続設定 (PostgreSQL)
# ===================================================================
# ポートフォリオとしてGitHubに公開するため、パスワードの直書き（ハードコード）は避け、
# 実行環境の「環境変数」から安全に読み込むように工夫しました。
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate 設定
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 裏側でどんなSQLが発行されているかを確認・勉強するため、ログを出力しています。
# （※実務の本番環境では、サーバーの負荷を減らすために false にするべきだと認識しています）
spring.jpa.show-sql=true

# アプリ起動時のテーブル自動更新設定
# （※現在は開発中のため update にしていますが、実務の本番環境では勝手にテーブルが
# 　変わる事故を防ぐため none に設定し、別途ツール等で管理すべきだと学習しています）
spring.jpa.hibernate.ddl-auto=update